name: Build and Package

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macOS-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.12'

      - name: Create and activate virtual environment
        if: runner.os != 'Windows'
        run: |
          python -m venv .venv
          source .venv/bin/activate

      - name: Create and activate virtual environment on Windows
        if: runner.os == 'Windows'
        run: |
          python -m venv .venv
          .venv\Scripts\activate

      - name: Build artifacts
        run: |
          pip install .
          build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MHGU_MHXX_Save_Converter_Script_${{ runner.os }}
          path: dist/*
          retention-days: 2
          compression-level: 9
  create_release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Create release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            Release ${{ github.ref }}
          draft: false
          prerelease: false
  publish:
    needs: create_release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: my-artifacts
          pattern: MHGU_MHXX_Save_Converter_Script_*
      - run: ls -R my-artifacts

      - name: Upload artifacts to release
        id: upload-release-asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: my-artifacts
          asset_name: MHGU_MHXX_Save_Converter_Script
          asset_content_type: application/zip
